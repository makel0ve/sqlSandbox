{% if error %}
<div style="padding: 15px; margin: 10px 0; background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; border-radius: 4px;">
    {{ error }}
</div>
{% endif %}
<table class="table" id="table">
    <thead>
        <tr>
            {% for column_name in column_names %}
            <th class="th-column-{{ loop.index }}">{{ column_name }}</th>
            {% endfor %}
        </tr>
    </thead>
    <tbody>
        {% for record in records %}
        <tr>
            {% for row in record %}
            <td class="column-{{ loop.index }}">{{ row }}</td>
            {% endfor %}
        </tr>
        {% endfor %}
    </tbody>
</table>
<span id="table_name" hidden>{{ table }}</span>
